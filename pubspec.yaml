name: ezeewash
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  go_router: ^17.0.0
  iconsax: ^0.0.8
  permission_handler: ^12.0.1
  url_launcher: ^6.3.2
  bloc: ^9.1.0
  flutter_bloc: ^9.1.1
  equatable: ^2.0.7
  google_fonts: ^6.3.3
  google_maps_flutter: ^2.14.2
  lottie: ^3.3.2
  image_picker: ^1.2.1
  device_info_plus: ^9.1.0


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.12.0

flutter:
  uses-material-design: true
  assets:
    - assets/animation/
    - assets/service_picture/
    - assets/services/
    - assets/images/

flutter_icons:
  android: true
  image_path: "assets/logo/applogo.png"